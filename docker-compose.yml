services:
  postgres:
    image: postgres:15-alpine
    container_name: rankedchoice_postgres
    environment:
      POSTGRES_DB: rankedchoice
      POSTGRES_USER: rankedchoice
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rankedchoice"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    container_name: rankedchoice_localstack
    ports:
      - "4567:4566"
    environment:
      - SERVICES=s3,sqs,ses,dynamodb,secretsmanager
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
    volumes:
      - localstack_data:/tmp/localstack
      - /var/run/docker.sock:/var/run/docker.sock

  mailhog:
    image: mailhog/mailhog:latest
    platform: linux/amd64
    container_name: rankedchoice_mailhog
    ports:
      - "1026:1025"
      - "8026:8025"

volumes:
  postgres_data:
  localstack_data:
